<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ea"/>
      <stop offset="100%" stop-color="#fbfaf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#b9ad95" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 54px Georgia, 'Times New Roman', serif; fill: #202020; }
      .subtitle { font: 400 24px 'Helvetica Neue', Arial, sans-serif; fill: #6b665d; }
      .section { font: 700 16px 'Helvetica Neue', Arial, sans-serif; letter-spacing: 1.6px; fill: #9b7a2e; }
      .cardtitle { font: 700 21px 'Helvetica Neue', Arial, sans-serif; fill: #252525; }
      .body { font: 400 18px 'Helvetica Neue', Arial, sans-serif; fill: #4f4a42; }
      .small { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #6e685f; }
      .badge { font: 700 13px 'Helvetica Neue', Arial, sans-serif; letter-spacing: 1px; }
      .arrow { stroke: #b39a63; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <text x="80" y="100" class="title">GitLaw Pro Agentic System Map</text>
  <text x="80" y="142" class="subtitle">Supervised multi-agent legal operations for small law firms</text>

  <text x="80" y="210" class="section">HUMAN CONTROL</text>
  <rect x="80" y="235" rx="26" ry="26" width="1440" height="110" fill="#fffdfa" stroke="#e7dcc6" filter="url(#shadow)"/>
  <text x="120" y="285" class="cardtitle">Owner</text>
  <text x="120" y="315" class="small">Kanzlei control, settings, tenant ownership</text>
  <text x="470" y="285" class="cardtitle">Lawyer</text>
  <text x="470" y="315" class="small">Review, approval, memory, final responsibility</text>
  <text x="920" y="285" class="cardtitle">Assistant</text>
  <text x="920" y="315" class="small">Intake, upload, OCR/translation queue, prep work</text>
  <text x="1320" y="285" class="cardtitle">Read-only</text>
  <text x="1320" y="315" class="small">View only</text>

  <text x="80" y="395" class="section">CORE WORKFLOW</text>

  <line x1="215" y1="605" x2="1385" y2="605" class="arrow"/>
  <polygon points="1385,605 1365,595 1365,615" fill="#b39a63"/>

  <g filter="url(#shadow)">
    <rect x="80" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="145" y="475" rx="999" ry="999" width="52" height="26" fill="#dcefd9"/>
    <text x="171" y="493" text-anchor="middle" class="badge" fill="#2f7a49">REAL</text>
    <text x="110" y="540" class="cardtitle">Intake Agent</text>
    <text x="110" y="575" class="body">Structures incoming requests, urgency, deadline signals.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="295" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="360" y="475" rx="999" ry="999" width="52" height="26" fill="#dcefd9"/>
    <text x="386" y="493" text-anchor="middle" class="badge" fill="#2f7a49">REAL</text>
    <text x="325" y="540" class="cardtitle">Document Agent</text>
    <text x="325" y="575" class="body">Renames, classifies and attaches files to the case.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="575" y="475" rx="999" ry="999" width="52" height="26" fill="#f7e7bf"/>
    <text x="601" y="493" text-anchor="middle" class="badge" fill="#9a6f00">BETA</text>
    <text x="540" y="540" class="cardtitle">OCR / Translation</text>
    <text x="540" y="575" class="body">Job-based OCR and German working translations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="725" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="790" y="475" rx="999" ry="999" width="52" height="26" fill="#ece7ff"/>
    <text x="816" y="493" text-anchor="middle" class="badge" fill="#5b4fb3">NEXT</text>
    <text x="755" y="540" class="cardtitle">Workflow Recommender</text>
    <text x="755" y="575" class="body">Suggests the next best step for the legal team.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="1005" y="475" rx="999" ry="999" width="52" height="26" fill="#dcefd9"/>
    <text x="1031" y="493" text-anchor="middle" class="badge" fill="#2f7a49">REAL</text>
    <text x="970" y="540" class="cardtitle">Research Agent</text>
    <text x="970" y="575" class="body">Generates structured legal answers with citations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1155" y="455" rx="28" ry="28" width="180" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="1220" y="475" rx="999" ry="999" width="52" height="26" fill="#f7e7bf"/>
    <text x="1246" y="493" text-anchor="middle" class="badge" fill="#9a6f00">BETA</text>
    <text x="1185" y="540" class="cardtitle">Citation Verifier</text>
    <text x="1185" y="575" class="body">Checks statutes and legal references for trust.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1370" y="455" rx="28" ry="28" width="150" height="210" fill="#fffdfa" stroke="#e5dac5"/>
    <rect x="1419" y="475" rx="999" ry="999" width="52" height="26" fill="#dcefd9"/>
    <text x="1445" y="493" text-anchor="middle" class="badge" fill="#2f7a49">REAL</text>
    <text x="1395" y="540" class="cardtitle">Drafting Agent</text>
    <text x="1395" y="575" class="body">Creates the first legal draft.</text>
  </g>

  <text x="80" y="760" class="section">TRUST + MEMORY LAYER</text>

  <rect x="80" y="790" rx="28" ry="28" width="470" height="150" fill="#fffdfa" stroke="#e5dac5" filter="url(#shadow)"/>
  <text x="110" y="840" class="cardtitle">Signed Pro Session + Tenant RBAC</text>
  <text x="110" y="875" class="body">Invite -> signed session -> tenant-scoped APIs, sync and uploads.</text>
  <text x="110" y="905" class="small">Code: api/_auth.ts, api/pro/session.ts, viewer/src/pro/ProAuth.tsx</text>

  <rect x="585" y="790" rx="28" ry="28" width="470" height="150" fill="#fffdfa" stroke="#e5dac5" filter="url(#shadow)"/>
  <rect x="615" y="810" rx="999" ry="999" width="52" height="26" fill="#f7e7bf"/>
  <text x="641" y="828" text-anchor="middle" class="badge" fill="#9a6f00">BETA</text>
  <text x="615" y="870" class="cardtitle">Memory Agent</text>
  <text x="615" y="905" class="body">Only approved answers are reusable. Firm memory improves research and drafting over time.</text>

  <rect x="1090" y="790" rx="28" ry="28" width="430" height="150" fill="#fffdfa" stroke="#e5dac5" filter="url(#shadow)"/>
  <text x="1120" y="840" class="cardtitle">Next Build Order</text>
  <text x="1120" y="875" class="body">1. Server-side entities  2. Real OCR/translation  3. Document-first drafting</text>
  <text x="1120" y="905" class="body">4. Workflow recommender  5. Practice-specific memory</text>
</svg>
