# Fly.io deployment for the GitLaw MCP server.
#
# What this gets you: a publicly addressable HTTPS endpoint
# (https://gitlaw-mcp.fly.dev/sse) that any hosted MCP client can connect to.
# Anti-hallucination citation tools, semantic search and citation-graph
# traversal — running in a Frankfurt region for DSGVO-aligned latency
# and data residency.
#
# First-time deploy (once you've installed `flyctl` and run `fly auth login`):
#
#   1. fly launch --no-deploy            # creates the app, accepts this toml
#   2. fly secrets set OPENAI_API_KEY=sk-...
#   3. fly volumes create gitlaw_data --region fra --size 1
#   4. fly deploy
#
# After that, push-to-deploy is wired via .github/workflows/fly-deploy.yml
# (just add FLY_API_TOKEN to your GitHub repo secrets).

app = "gitlaw-mcp"
primary_region = "fra"          # Frankfurt — DSGVO-aligned, low EU latency

[build]
  dockerfile = "gitlaw_mcp/Dockerfile.fly"

[env]
  MCP_TRANSPORT = "sse"          # serve over HTTP+SSE for hosted clients
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  PYTHONDONTWRITEBYTECODE = "1"

# Mount a persistent volume for the FAISS vectorstore + citation graph.
# These are regenerated by `python -m gitlaw_mcp.graph_builder` on first deploy
# (or refreshed via a scheduled fly machine run later).
[mounts]
  source = "gitlaw_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"    # scale-to-zero when idle
  auto_start_machines = true
  min_machines_running = 0       # zero idle cost
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/sse"
    # SSE endpoint returns 200 with text/event-stream — counts as healthy

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512                # plenty for our lazy-loaded FAISS + graph
